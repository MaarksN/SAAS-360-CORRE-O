global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000

  - job_name: web
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3001

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3002

  - job_name: database
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: queue
    static_configs:
      - targets:
          - redis-exporter:9121
