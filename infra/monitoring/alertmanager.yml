global:
  resolve_timeout: 5m

route:
  receiver: escalation-p3
  group_by:
    - alertname
    - sla_severity
    - sla_state
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 30m
  routes:
    - matchers:
        - alertname=~"SlaAtRiskP0|SlaBreachedP0"
      receiver: escalation-p0
      continue: false
    - matchers:
        - alertname=~"SlaAtRiskP1|SlaBreachedP1"
      receiver: escalation-p1
      continue: false
    - matchers:
        - alertname=~"SlaAtRiskP2|SlaBreachedP2"
      receiver: escalation-p2
      continue: false
    - matchers:
        - alertname=~"SlaAtRiskP3|SlaBreachedP3"
      receiver: escalation-p3
      continue: false

receivers:
  - name: escalation-p0
    webhook_configs:
      - url: http://webhook-receiver:8080/escalation/p0
        send_resolved: true

  - name: escalation-p1
    webhook_configs:
      - url: http://webhook-receiver:8080/escalation/p1
        send_resolved: true

  - name: escalation-p2
    webhook_configs:
      - url: http://webhook-receiver:8080/escalation/p2
        send_resolved: true

  - name: escalation-p3
    webhook_configs:
      - url: http://webhook-receiver:8080/escalation/p3
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - sla_severity="P0"
    target_matchers:
      - sla_severity=~"P1|P2|P3"
    equal:
      - alertname
