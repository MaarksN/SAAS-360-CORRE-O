name: Tech debt
description: Registrar nova divida tecnica com owner, prioridade e prazo
title: "[TD] "
labels:
  - tech-debt
body:
  - type: textarea
    id: debt
    attributes:
      label: Debt description
      description: Descreva a divida, a origem e o risco caso ela continue aberta.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Owner
      placeholder: Time ou pessoa responsavel
    validations:
      required: true
  - type: input
    id: due_date
    attributes:
      label: Due date
      placeholder: YYYY-MM-DD
    validations:
      required: true
  - type: dropdown
    id: residual_risk
    attributes:
      label: Residual risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or references
      description: PRs, logs, dashboards ou docs relacionadas
    validations:
      required: true
