name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - 'codex/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: branch-name
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm branch:check
      timeout_minutes: 10

  commit-messages:
    name: commitlint
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:commitlint
      fetch_depth: 0
      timeout_minutes: 10

  lockfile-integrity:
    name: lockfile-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce agent surface freeze
        run: node scripts/ci/check-agent-surface-freeze.mjs

      - name: Enforce legacy DB surface freeze
        run: node scripts/ci/check-legacy-db-surface-freeze.mjs

      - name: Enforce legacy runtime surface freeze
        run: node scripts/ci/check-legacy-runtime-surface-freeze.mjs

      - name: Enforce lockfile governance
        run: pnpm ci:lockfile

  lockfile-corruption-simulation:
    name: lockfile-corruption-simulation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Corrupt lockfile fixture
        shell: bash
        run: |
          set -euo pipefail
          cp pnpm-lock.yaml pnpm-lock.yaml.bak
          printf '\n__corrupted_lockfile_marker: [\n' >> pnpm-lock.yaml

      - name: Assert frozen install fails on corrupted lockfile
        shell: bash
        run: |
          set +e
          pnpm install --frozen-lockfile > lockfile-corruption.log 2>&1
          status=$?
          set -e

          if [[ "${status}" -eq 0 ]]; then
            echo "::error title=Lockfile corruption simulation failed::pnpm install unexpectedly succeeded."
            cat lockfile-corruption.log
            exit 1
          fi

          if ! grep -Eiq "ERR_PNPM|lockfile|yaml|parse" lockfile-corruption.log; then
            echo "::warning::Install failed as expected, but lockfile-specific markers were not found in output."
          fi

      - name: Restore lockfile
        if: always()
        shell: bash
        run: mv pnpm-lock.yaml.bak pnpm-lock.yaml

  inline-credentials:
    name: inline-credentials
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm security:inline-credentials
      timeout_minutes: 10

  documentation-links:
    name: documentation-links
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm docs:check-links
      timeout_minutes: 15

  repo-hygiene:
    name: repo-hygiene
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm hygiene:check
      fetch_depth: 0
      timeout_minutes: 20

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-guardrails:
    name: security-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Enforce security guardrails
        run: pnpm ci:security-guardrails
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  platform:
    name: platform (${{ matrix.task }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - typecheck
          - test
          - test:isolation
          - build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Bootstrap CI database
        if: ${{ matrix.task == 'test' || matrix.task == 'test:isolation' }}
        run: pnpm db:bootstrap:ci
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Run ${{ matrix.task }}
        run: pnpm ci:task ${{ matrix.task }}
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  satellites:
    name: satellites
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt -r apps/webhook-receiver/requirements.txt

      - name: Run satellites lane
        run: pnpm ci:task satellites
        env:
          INTERNAL_SERVICE_TOKEN: ci-service-token
          NODE_ENV: test
          STRICT_RUNTIME: "false"
          SVIX_WEBHOOK_SECRET: svix-test-secret

  workflow-suite:
    name: workflow-suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Bootstrap CI database
        run: pnpm db:bootstrap:ci
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Run workflow suite
        run: pnpm ci:task workflow-suite
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  pack-tests:
    name: pack-tests
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:task pack-tests
      timeout_minutes: 20

  governance-gates:
    name: governance-gates
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm monorepo:doctor && RELEASE_SCORECARD_MIN_SCORE=100 pnpm release:scorecard && pnpm audit:ownership
      timeout_minutes: 15

  e2e-release:
    name: e2e-release
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm test:e2e:release
      timeout_minutes: 20

  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - branch-name
      - commit-messages
      - lockfile-integrity
      - lockfile-corruption-simulation
      - inline-credentials
      - documentation-links
      - repo-hygiene
      - gitleaks
      - security-guardrails
      - platform
      - satellites
      - workflow-suite
      - pack-tests
      - governance-gates
      - e2e-release
    steps:
      - name: Done
        run: echo "All required checks passed."
