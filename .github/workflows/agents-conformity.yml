name: Agent Packs Conformity

on:
  pull_request:
    paths:
      - 'packages/agent-packs/**'
      - 'scripts/agent/**'
      - '.github/workflows/agents-conformity.yml'
  push:
    branches: [ main ]
    paths:
      - 'packages/agent-packs/**'
      - 'scripts/agent/**'
      - '.github/workflows/agents-conformity.yml'

jobs:
  validate-agent-packs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate generated collection
        run: corepack pnpm --filter @birthub/agent-packs validate

      - name: Test generated collection
        run: corepack pnpm --filter @birthub/agent-packs test

      - name: Upload generated collection evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-packs-readiness
          path: packages/agent-packs/github-agents-v1/**/readiness.json
