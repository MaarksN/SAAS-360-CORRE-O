name: Materialize Doc-Only Controls

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'codex/**'

permissions:
  contents: read

jobs:
  materialize-doc-only:
    name: materialize-doc-only
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run technical materialization controls
        run: pnpm audit:materialize:all

      - name: Upload materialization report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: materialize-doc-only-report
          path: artifacts/materialization/**
