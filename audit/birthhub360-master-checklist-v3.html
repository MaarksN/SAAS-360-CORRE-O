<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirthHub360 — Master Checklist v3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050810;--s1:rgba(255,255,255,.035);--s2:rgba(255,255,255,.055);
  --hov:rgba(255,255,255,.055);--brd:rgba(255,255,255,.07);
  --brd2:rgba(120,200,255,.18);--txt:#dde4f0;--mut:#5a6880;--mut2:#3d4d63;
  --r:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
  --c1:#00d4ff;--c2:#7c3aed;--c3:#06ffa5;--c4:#ffb347;--c5:#ff5f5f;
  --c6:#c4b5fd;--c7:#7dd3fc;--c8:#f472b6;
  --codex:#00d4ff;--jules:#c4b5fd;--marcelo:#ffb347;
  --p0bg:rgba(255,60,60,.12);--p0b:rgba(255,80,80,.35);--p0t:#ff7070;
  --p1bg:rgba(255,179,71,.1);--p1b:rgba(255,179,71,.3);--p1t:#ffb347;
  --p2bg:rgba(90,104,128,.12);--p2b:rgba(90,104,128,.25);--p2t:#6b7a94;
  --dng:rgba(6,255,165,.07);--dnb:rgba(6,255,165,.2);
  --b1:#ff9f43;--b2:#00d4ff;--b3:#06ffa5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 40% at 8% -5%,rgba(0,212,255,.065) 0%,transparent 55%),
  radial-gradient(ellipse 55% 45% at 92% 15%,rgba(124,58,237,.08) 0%,transparent 50%),
  radial-gradient(ellipse 45% 35% at 50% 105%,rgba(6,255,165,.045) 0%,transparent 55%);
  pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:44px 20px 80px;}

/* HEADER */
header{text-align:center;margin-bottom:40px;}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(0,212,255,.09);border:1px solid rgba(0,212,255,.22);border-radius:100px;padding:5px 15px;font-family:'Space Mono',monospace;font-size:10px;color:var(--c1);letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px;}
h1{font-size:clamp(24px,4.5vw,40px);font-weight:800;letter-spacing:-.03em;background:linear-gradient(130deg,#dde4f0 0%,var(--c1) 55%,var(--c2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.sub{color:var(--mut);font-size:13px;letter-spacing:.04em;}

/* MASTER PROGRESS */
.master{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:20px 24px;margin-bottom:14px;backdrop-filter:blur(14px);}
.master-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.master-pct{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--c3);line-height:1;}
.master-lbl{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);}
.prog-track{height:5px;background:rgba(255,255,255,.05);border-radius:100px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--c3));border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(6,255,165,.35);}
.stats{display:flex;flex-wrap:wrap;gap:18px;align-items:center;}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-n{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;}
.stat-l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;}
.stat-n.green{color:var(--c3);}.stat-n.red{color:var(--p0t);}.stat-n.gold{color:var(--marcelo);}

/* BLOCK PROGRESS ROW */
.bprog-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.bprog{flex:1;min-width:140px;background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;}
.bprog-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.bprog-title{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;}
.bprog-pct{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
.bprog-track{height:3px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden;}
.bprog-fill{height:100%;border-radius:100px;transition:width .4s ease;}
.bprog.b1-blk .bprog-title,.bprog.b1-blk .bprog-pct{color:var(--b1);}
.bprog.b1-blk .bprog-fill{background:var(--b1);}
.bprog.b2-blk .bprog-title,.bprog.b2-blk .bprog-pct{color:var(--b2);}
.bprog.b2-blk .bprog-fill{background:var(--b2);}
.bprog.b3-blk .bprog-title,.bprog.b3-blk .bprog-pct{color:var(--b3);}
.bprog.b3-blk .bprog-fill{background:var(--b3);}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.fbtn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border-radius:8px;cursor:pointer;border:1px solid var(--brd);background:var(--s1);color:var(--mut);transition:var(--tr);white-space:nowrap;}
.fbtn:hover{background:var(--hov);color:var(--txt);}
.fbtn.active{background:var(--s2);border-color:var(--brd2);color:var(--txt);}
.fbtn.f-p0.active{border-color:var(--p0b);color:var(--p0t);background:var(--p0bg);}
.fbtn.f-pend.active{border-color:var(--p1b);color:var(--p1t);background:var(--p1bg);}
.fbtn.f-done.active{border-color:var(--dnb);color:var(--c3);background:var(--dng);}
.reset-btn{margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,95,95,.22);background:rgba(255,95,95,.08);color:var(--p0t);transition:var(--tr);}
.reset-btn:hover{background:rgba(255,95,95,.15);border-color:rgba(255,95,95,.4);}

/* BLOCK HEADER */
.blk-hdr{display:flex;align-items:center;gap:14px;margin:28px 0 12px;padding:14px 18px;border-radius:var(--r);border-left:3px solid;background:var(--s1);}
.blk-hdr.b1{border-color:var(--b1);background:rgba(255,159,67,.05);}
.blk-hdr.b2{border-color:var(--b2);background:rgba(0,212,255,.04);}
.blk-hdr.b3{border-color:var(--b3);background:rgba(6,255,165,.04);}
.blk-glyph{font-size:20px;line-height:1;}
.blk-info{flex:1;}
.blk-title{font-size:14px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
.blk-hdr.b1 .blk-title{color:var(--b1);}.blk-hdr.b2 .blk-title{color:var(--b2);}.blk-hdr.b3 .blk-title{color:var(--b3);}
.blk-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.06em;margin-top:2px;}
.blk-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap;}

/* INFO CARD (cronograma / rules) */
.info-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;}
.info-card-title{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);margin-bottom:12px;}
.crono-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.crono-cell{background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:7px;padding:8px 10px;text-align:center;}
.crono-day{font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.08em;margin-bottom:2px;}
.crono-pr{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--b1);margin-bottom:1px;}
.crono-focus{font-size:10px;color:var(--mut);line-height:1.3;}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.rule-item{background:rgba(255,80,80,.06);border:1px solid rgba(255,80,80,.15);border-radius:7px;padding:8px 10px;font-size:11px;color:rgba(255,200,200,.7);display:flex;gap:7px;align-items:flex-start;}
.rule-x{color:var(--p0t);font-weight:700;flex-shrink:0;}
.cond-grid{display:flex;flex-direction:column;gap:6px;}
.cond-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:rgba(6,255,165,.04);border:1px solid rgba(6,255,165,.15);border-radius:7px;font-size:12px;color:rgba(180,255,220,.75);}
.cond-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--c3);flex-shrink:0;margin-top:1px;}

/* SECTION */
.sec{margin-bottom:10px;border-radius:var(--r);border:1px solid var(--brd);background:var(--s1);backdrop-filter:blur(10px);overflow:hidden;transition:border-color var(--tr),opacity var(--tr);}
.sec:hover{border-color:var(--brd2);}
.sec.gated{opacity:.5;pointer-events:none;}
.sec.filter-hidden{display:none;}
.sec-hdr{display:flex;align-items:center;gap:11px;padding:14px 18px;cursor:pointer;user-select:none;transition:background var(--tr);}
.sec-hdr:hover{background:var(--hov);}
.sec.gated .sec-hdr{cursor:default;}
.sec-num{flex-shrink:0;width:38px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.02em;}
.sec-info{flex:1;min-width:0;}
.sec-title{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:1px;}
.sec-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.04em;}
.sec-right{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.mini-bar{width:68px;height:3px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden;}
.mini-fill{height:100%;border-radius:100px;transition:width .4s ease;}
.mini-pct{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);min-width:30px;text-align:right;}
.chev{color:var(--mut);font-size:9px;transition:transform var(--tr);}
.sec.open .chev{transform:rotate(180deg);}
.gate-lk{display:none;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:9px;color:var(--p0t);letter-spacing:.05em;padding:2px 8px;border-radius:100px;background:var(--p0bg);border:1px solid var(--p0b);}
.sec.gated .gate-lk{display:flex;}
.done-bdg{display:none;font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border-radius:100px;background:var(--dng);color:var(--c3);border:1px solid var(--dnb);}
.sec.complete .done-bdg{display:block;}
.day-bdg{flex-shrink:0;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:2px 7px;border-radius:5px;background:rgba(255,159,67,.1);border:1px solid rgba(255,159,67,.25);color:var(--b1);}

/* TASKS */
.tasks{display:none;flex-direction:column;padding:2px 18px 14px;}
.sec.open .tasks{display:flex;}
.outcome{margin:6px 0 8px;padding:8px 12px;border-radius:7px;background:rgba(0,212,255,.04);border-left:2px solid rgba(0,212,255,.25);font-size:11.5px;color:rgba(180,210,240,.65);font-style:italic;}
.outcome strong{color:var(--c1);font-style:normal;font-weight:600;}
.twrap{margin-bottom:2px;}
.task{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background var(--tr);border:1px solid transparent;}
.task:hover{background:var(--hov);}
.task.checked{background:var(--dng);border-color:var(--dnb);}
.task.filter-hidden{display:none;}
.task-cb{flex-shrink:0;width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin-top:2px;transition:var(--tr);font-size:9px;color:transparent;}
.task.checked .task-cb{background:rgba(6,255,165,.18);border-color:rgba(6,255,165,.55);color:var(--c3);}
.task-body{flex:1;min-width:0;}
.task-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
.task-txt{font-size:12.5px;line-height:1.45;color:var(--txt);flex:1;min-width:180px;}
.task.checked .task-txt{color:var(--mut);text-decoration:line-through;text-decoration-color:rgba(6,255,165,.25);}
.pbdg{flex-shrink:0;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.07em;padding:1px 6px;border-radius:4px;border:1px solid;}
.pbdg.P0{background:var(--p0bg);border-color:var(--p0b);color:var(--p0t);}
.pbdg.P1{background:var(--p1bg);border-color:var(--p1b);color:var(--p1t);}
.pbdg.P2{background:var(--p2bg);border-color:var(--p2b);color:var(--p2t);}
.obdg{flex-shrink:0;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.06em;padding:1px 6px;border-radius:4px;border:1px solid;}
.obdg.CODEX{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.25);color:var(--codex);}
.obdg.JULES{background:rgba(196,181,253,.08);border-color:rgba(196,181,253,.22);color:var(--jules);}
.obdg.MARCELO{background:rgba(255,179,71,.08);border-color:rgba(255,179,71,.22);color:var(--marcelo);}
.ev-btn{flex-shrink:0;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:1px 7px;border-radius:4px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--mut);transition:var(--tr);}
.ev-btn:hover{border-color:var(--brd2);color:var(--txt);}
.ev-btn.has-ev{border-color:rgba(6,255,165,.3);color:var(--c3);background:rgba(6,255,165,.06);}
.ev-area{display:none;margin-top:5px;padding:7px 9px;background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:6px;}
.ev-area.open{display:block;}
.ev-inp{width:100%;background:transparent;border:none;color:var(--txt);font-family:'Space Mono',monospace;font-size:10px;resize:none;outline:none;line-height:1.5;}
.ev-inp::placeholder{color:var(--mut2);}
.ev-hint{margin-top:3px;font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.04em;}
.tn{flex-shrink:0;font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.12);margin-top:3px;min-width:20px;}

/* SECTION COLOR THEMES */
/* PRs (amber) */
.pr1 .sec-num,.pr2 .sec-num,.pr3 .sec-num,.pr4 .sec-num,.pr5 .sec-num,
.pr6 .sec-num,.pr7 .sec-num,.pr8 .sec-num,.pr9 .sec-num,.pr10 .sec-num{background:rgba(255,159,67,.1);color:var(--b1);}
.pr1 .sec-title,.pr2 .sec-title,.pr3 .sec-title,.pr4 .sec-title,.pr5 .sec-title,
.pr6 .sec-title,.pr7 .sec-title,.pr8 .sec-title,.pr9 .sec-title,.pr10 .sec-title{color:#ffe4b3;}
.pr1 .mini-fill,.pr2 .mini-fill,.pr3 .mini-fill,.pr4 .mini-fill,.pr5 .mini-fill,
.pr6 .mini-fill,.pr7 .mini-fill,.pr8 .mini-fill,.pr9 .mini-fill{background:var(--b1);}
.pr10 .mini-fill{background:linear-gradient(90deg,#ffd700,var(--c3));}
.pr10 .sec-num{background:rgba(255,215,0,.12);color:#ffd700;}
.pr10 .sec-title{color:#fff3b3;}

/* Etapas (cyan family, from v2) */
.e1 .sec-num{background:rgba(0,212,255,.1);color:var(--c1);}
.e2 .sec-num{background:rgba(124,58,237,.14);color:var(--c6);}
.e3 .sec-num{background:rgba(6,255,165,.09);color:var(--c3);}
.e4 .sec-num{background:rgba(255,179,71,.11);color:var(--c4);}
.e5 .sec-num{background:rgba(255,95,95,.11);color:var(--c5);}
.e6 .sec-num{background:rgba(196,181,253,.11);color:var(--c6);}
.e7 .sec-num{background:rgba(125,211,252,.1);color:var(--c7);}
.e1 .sec-title{color:#b5e8ff;}.e2 .sec-title{color:#d4caff;}.e3 .sec-title{color:#b3ffe4;}
.e4 .sec-title{color:#ffe8b3;}.e5 .sec-title{color:#ffcaca;}.e6 .sec-title{color:#e4dbff;}.e7 .sec-title{color:#c5e9ff;}
.e1 .mini-fill{background:var(--c1);}.e2 .mini-fill{background:var(--c6);}.e3 .mini-fill{background:var(--c3);}
.e4 .mini-fill{background:var(--c4);}.e5 .mini-fill{background:var(--c5);}.e6 .mini-fill{background:var(--c6);}.e7 .mini-fill{background:var(--c7);}

/* World-class (green/teal family) */
.w1 .sec-num,.w4 .sec-num,.w7 .sec-num{background:rgba(6,255,165,.09);color:var(--c3);}
.w2 .sec-num,.w5 .sec-num,.w8 .sec-num{background:rgba(56,189,248,.1);color:#38bdf8;}
.w3 .sec-num,.w6 .sec-num,.w9 .sec-num{background:rgba(167,139,250,.1);color:var(--c6);}
.w1 .sec-title,.w4 .sec-title,.w7 .sec-title{color:#b3ffe4;}
.w2 .sec-title,.w5 .sec-title,.w8 .sec-title{color:#baeeff;}
.w3 .sec-title,.w6 .sec-title,.w9 .sec-title{color:#e4dbff;}
.w1 .mini-fill,.w4 .mini-fill,.w7 .mini-fill{background:var(--c3);}
.w2 .mini-fill,.w5 .mini-fill,.w8 .mini-fill{background:#38bdf8;}
.w3 .mini-fill,.w6 .mini-fill,.w9 .mini-fill{background:var(--c6);}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:10px 14px;background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:14px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.05em;}
.leg-sep{color:var(--mut2);}
.leg{display:flex;align-items:center;gap:4px;}
.ldot{width:7px;height:7px;border-radius:2px;}

@media(max-width:580px){
  .crono-grid{grid-template-columns:repeat(2,1fr);}
  .bprog-row{flex-direction:column;}
  .stats{gap:12px;}
  h1{font-size:22px;}
  .sec-hdr{padding:12px 14px;}
  .tasks{padding:2px 14px 12px;}
  .mini-bar{width:50px;}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="badge">◈ BirthHub360 · Master Governance v3</div>
  <h1>Master Checklist de Auditoria</h1>
  <p class="sub">3 blocos · 26 seções · 202 ações · go-live gate</p>
</header>

<div class="master">
  <div class="master-top"><span class="master-lbl">Progresso Global</span><span class="master-pct" id="gPct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="gBar" style="width:0%"></div></div>
  <div class="stats">
    <div class="stat"><span class="stat-n green" id="sDone">0</span><span class="stat-l">Concluídas</span></div>
    <div class="stat"><span class="stat-n" id="sAll">202</span><span class="stat-l">Total</span></div>
    <div class="stat"><span class="stat-n red" id="sP0">0</span><span class="stat-l">P0 Pendentes</span></div>
    <div class="stat"><span class="stat-n gold" id="sEv">0</span><span class="stat-l">Com evidência</span></div>
    <div class="stat"><span class="stat-n" id="sSecs">0/26</span><span class="stat-l">Seções OK</span></div>
    <button class="reset-btn" id="resetBtn">↺ Reset</button>
  </div>
</div>

<div class="bprog-row" id="bprogRow"></div>

<div class="legend">
  <span class="leg-sep">OWNER →</span>
  <div class="leg"><div class="ldot" style="background:var(--codex)"></div><span style="color:var(--codex)">CODEX</span></div>
  <div class="leg"><div class="ldot" style="background:var(--jules)"></div><span style="color:var(--jules)">JULES</span></div>
  <div class="leg"><div class="ldot" style="background:var(--marcelo)"></div><span style="color:var(--marcelo)">MARCELO</span></div>
  <span class="leg-sep" style="margin-left:8px">PRIORIDADE →</span>
  <div class="leg"><div class="ldot" style="background:var(--p0t)"></div><span style="color:var(--p0t)">P0 bloqueador</span></div>
  <div class="leg"><div class="ldot" style="background:var(--p1t)"></div><span style="color:var(--p1t)">P1 importante</span></div>
  <div class="leg"><div class="ldot" style="background:var(--mut)"></div><span style="color:var(--mut)">P2 higiene</span></div>
</div>

<div class="filter-bar">
  <button class="fbtn active" data-f="all">Todos</button>
  <button class="fbtn f-p0"   data-f="p0">P0 Bloqueadores</button>
  <button class="fbtn f-pend" data-f="pending">Pendentes</button>
  <button class="fbtn f-done" data-f="done">Concluídos</button>
  <button class="reset-btn" id="resetBtn2">↺ Reset</button>
</div>

<div id="root"></div>
</div>

function tk(s,i){return s+'_t'+i;}
function ek(s,i){return s+'_e'+i;}
function eok(s,i){return s+'_eo'+i;}
function opk(s){return 'op_'+s;}
function isChk(s,i){return !!ST[tk(s,i)];}
function getEv(s,i){return ST[ek(s,i)]||'';}
function isOp(s){return ST[opk(s)]!==false;}

// Gate logic: within same block, previous section must have P0s done
function isGated(idx){
  const cur=SECTIONS.filter(s=>s.type==='stage')[idx];
  if(!cur) return false;
  const stages=SECTIONS.filter(s=>s.type==='stage');
  const si=stages.indexOf(cur);
  if(si===0) return false;
  // find prev in same block
  let prev=null;
  for(let i=si-1;i>=0;i--){
    if(stages[i].block===cur.block){prev=stages[i];break;}
  }
  if(!prev) return false;
  // BLOCO III: no gates
  if(cur.block==='b3') return false;
  return prev.tasks.some((t,ti)=>t.p==='P0'&&!isChk(prev.id,ti));
}

    const complete=done===total;
    const p0pend=sec.tasks.filter((t,ti)=>t.p==='P0'&&!isChk(sec.id,ti)).length;

    tDone+=done;tAll+=total;
    if(p0pend) tP0+=p0pend;
    sec.tasks.forEach((_,ti)=>{if(getEv(sec.id,ti)) tEv++;});
    if(complete) sOK++;
    bStats[sec.block].done+=done;bStats[sec.block].all+=total;

    // Filter: does this section have any visible tasks?
    let hasVis=false;
    if(AF==='all') hasVis=true;
    else if(AF==='p0') hasVis=sec.tasks.some(t=>t.p==='P0');
    else if(AF==='pending') hasVis=sec.tasks.some((_,ti)=>!isChk(sec.id,ti));
    else if(AF==='done') hasVis=sec.tasks.some((_,ti)=>isChk(sec.id,ti));

    const dayBdg=sec.day?`<span class="day-bdg">DIA ${sec.day}</span>`:'';

    let taskRows='';
    sec.tasks.forEach((task,ti)=>{
      const chk=isChk(sec.id,ti);
      const ev=getEv(sec.id,ti);
      const evOp=ST[eok(sec.id,ti)];
      let vis=true;
      if(AF==='p0') vis=task.p==='P0';
      else if(AF==='pending') vis=!chk;
      else if(AF==='done') vis=chk;
      taskRows+=`
        <div class="twrap">
          <div class="task ${chk?'checked':''} ${!vis?'filter-hidden':''}" onclick="toggleTask('${sec.id}',${ti},event)">
            <span class="tn">${String(ti+1).padStart(2,'0')}</span>
            <div class="task-cb">${chk?'✓':''}</div>
            <div class="task-body">
              <div class="task-top">
                <span class="task-txt">${task.t}</span>
                <span class="pbdg ${task.p}">${task.p}</span>
                <span class="obdg ${task.o}">${task.o}</span>
                <button class="ev-btn ${ev?'has-ev':''}" onclick="toggleEv('${sec.id}',${ti},event)">${ev?'● ev':'+ ev'}</button>
              </div>
              <div class="ev-area ${evOp?'open':''}" id="ea-${sec.id}-${ti}">
                <textarea class="ev-inp" rows="2" placeholder="Commit hash, PR link, nota de evidência…" onchange="saveEv('${sec.id}',${ti},this.value)" onclick="event.stopPropagation()">${ev}</textarea>
                <div class="ev-hint">↑ salvo no localStorage automaticamente</div>
              </div>
            </div>
          </div>
        </div>`;
    });

    const el=document.createElement('div');
    el.className=`sec ${sec.cls} ${complete?'complete':''} ${open?'open':''} ${gated?'gated':''} ${!hasVis?'filter-hidden':''}`;
    el.id=`s-${sec.id}`;
    el.innerHTML=`
      <div class="sec-hdr" onclick="toggleSec('${sec.id}',${gated})">
        <div class="sec-num">${sec.n}</div>
        <div class="sec-info">
          <div class="sec-title">${sec.title}</div>
          <div class="sec-meta">${done}/${total} tarefas${p0pend?' · '+p0pend+' P0 pendentes':' · P0 ok'}</div>
        </div>
        <div class="sec-right">
          ${dayBdg}
          <div class="gate-lk">🔒 Gate — finalize P0 anterior</div>
          <span class="done-bdg">✓ Completo</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
          <span class="mini-pct">${pct}%</span>
          <span class="chev">▾</span>
        </div>
      </div>
      <div class="tasks">
        <div class="outcome"><strong>▸ Resultado esperado:</strong> ${sec.outcome}</div>
        ${taskRows}
      </div>`;
    root.appendChild(el);
  });

  // Global stats
  const gp=tAll?Math.round(tDone/tAll*100):0;
  document.getElementById('gPct').textContent=gp+'%';
  document.getElementById('gBar').style.width=gp+'%';
  document.getElementById('sDone').textContent=tDone;
  document.getElementById('sAll').textContent=tAll;
  document.getElementById('sP0').textContent=tP0;
  document.getElementById('sEv').textContent=tEv;
  document.getElementById('sSecs').textContent=sOK+'/'+stages.length;

  // Block progress row
  const bpr=document.getElementById('bprogRow');
  bpr.innerHTML=BLOCKS.map(b=>{
    const bp=bStats[b.id];
    const p=bp.all?Math.round(bp.done/bp.all*100):0;
    return `<div class="bprog ${b.cls}"><div class="bprog-top"><span class="bprog-title">${b.title.replace('BLOCO ','').split('—')[0].trim()}</span><span class="bprog-pct">${p}%</span></div><div class="bprog-track"><div class="bprog-fill" style="width:${p}%"></div></div></div>`;
  }).join('');
}

function toggleTask(sid,ti,e){e.stopPropagation();ST[tk(sid,ti)]=!ST[tk(sid,ti)];save();renderAll();}
function toggleSec(sid,gated){if(gated)return;ST[opk(sid)]=isOp(sid)?false:true;save();renderAll();}
function toggleEv(sid,ti,e){
  e.stopPropagation();
  const k=eok(sid,ti);ST[k]=!ST[k];save();renderAll();
  setTimeout(()=>{const ta=document.querySelector(`#ea-${sid}-${ti} .ev-inp`);if(ta&&ST[k])ta.focus();},40);
}
function saveEv(sid,ti,val){ST[ek(sid,ti)]=val.trim();save();renderAll();}
function resetAll(){if(!confirm('Resetar todo o progresso, checks e evidências?'))return;ST={};save();init();
  // Force save the auto injected data
  save();}

document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');AF=b.dataset.f;renderAll();
}));
document.getElementById('resetBtn').addEventListener('click',resetAll);
document.getElementById('resetBtn2').addEventListener('click',resetAll);

function init(){
  load();
  SECTIONS.filter(s=>s.type==='stage').forEach(s=>{
    if(ST[opk(s.id)]===undefined) ST[opk(s.id)]=true;
  });
  renderAll();
}
init();
</script>
</body>
</html>
